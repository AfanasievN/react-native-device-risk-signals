name: Publish Package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    if: github.event.release.prerelease == false
    runs-on: ubuntu-latest
    steps:
      - name: Check out release
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24.16.0"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Verify release version
        run: node scripts/verify-release-version.mjs "${{ github.event.release.tag_name }}"
      - run: npm ci
      - name: Check whether this version is already published
        id: npm_version
        shell: bash
        run: |
          package_spec=$(node -p "const p = require('./package.json'); p.name + '@' + p.version")
          if npm view "$package_spec" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "$package_spec is already published; skipping npm publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish package
        if: steps.npm_version.outputs.published != 'true'
        run: npm publish

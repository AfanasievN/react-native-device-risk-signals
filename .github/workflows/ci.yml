name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  library:
    name: Library checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.16.0"
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm pack --dry-run

  example:
    name: Example checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.16.0"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            example/package-lock.json
      - run: npm ci
      - run: npm ci --prefix example
      - run: npm test --prefix example -- --runInBand --watchman=false
      - run: npm run lint --prefix example
      - run: npx --prefix example tsc --noEmit -p example/tsconfig.json

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  library:
    name: Library checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24.16.0"
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm pack --dry-run

  example:
    name: Example checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24.16.0"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            example/package-lock.json
      - run: npm ci
      - run: npm ci --prefix example
      - run: npm test --prefix example -- --runInBand --watchman=false
      - run: npm run lint --prefix example
      - run: npx --prefix example tsc --noEmit -p example/tsconfig.json

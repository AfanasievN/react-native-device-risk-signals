version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    groups:
      root-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
    open-pull-requests-limit: 0

  - package-ecosystem: npm
    directory: /example
    schedule:
      interval: monthly
    groups:
      example-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
    open-pull-requests-limit: 0

  - package-ecosystem: bundler
    directory: /example
    schedule:
      interval: monthly
    groups:
      ruby-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
    open-pull-requests-limit: 0

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 1

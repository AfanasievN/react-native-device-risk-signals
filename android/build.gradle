buildscript {
  ext.DeviceIntel = [
    kotlinVersion: "2.0.21",
    minSdkVersion: 24,
    compileSdkVersion: 36,
    targetSdkVersion: 36
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }

    return DeviceIntel[prop]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

apply plugin: "com.facebook.react"

android {
  namespace "com.reactnativedeviceintel"

  // New-architecture codegen output. The react {} block below makes RN generate
  // NativeDeviceIntelSpec (the abstract class DeviceIntelModule extends) from the JS
  // TurboModule spec (src/NativeDeviceIntel.ts); this line puts that generated Java on
  // the library's own compile classpath.
  sourceSets {
    main {
      java.srcDirs += ["${project.buildDir}/generated/source/codegen/java"]
    }
  }

  compileSdkVersion getExtOrDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")
    targetSdkVersion getExtOrDefault("targetSdkVersion")
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lint {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }
}

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "org.jetbrains.kotlin:kotlin-stdlib:${getExtOrDefault('kotlinVersion')}"
}

react {
  jsRootDir = file("../src/")
  libraryName = "RnDeviceIntel"
  codegenJavaPackageName = "com.reactnativedeviceintel"
}
